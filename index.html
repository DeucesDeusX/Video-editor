<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reel Lab v0.7</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0d13;
      --panel: #10141d;
      --panel-2: #161b27;
      --panel-3: #1c2333;
      --line: #242c3f;
      --line-2: #323c54;
      --text: #e8ecf5;
      --muted: #8d99b0;
      --mutedder: #5e6a82;
      --accent: #7ea3ff;
      --accent-2: #5a82dc;
      --good: #6ce0b6;
      --warn: #f4c166;
      --bad: #ff7a85;
      --overlay-hue: 162;
      --main-hue: 218;
      --music-hue: 40;
      --radius: 8px;
      --radius-sm: 5px;
      --radius-lg: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }

    body {
      font-family: 'Geist', -apple-system, system-ui, sans-serif;
      font-feature-settings: 'cv11', 'ss01';
      color: var(--text);
      background: var(--bg);
      overflow: hidden;
      user-select: none;
      -webkit-font-smoothing: antialiased;
    }

    #root {
      display: flex;
      flex-direction: column;
    }

    /* --- scrollbars --- */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--mutedder); }

    /* --- typography --- */
    .font-mono { font-family: 'Geist Mono', ui-monospace, monospace; }
    .muted { color: var(--muted); }
    .micro { font-size: 11px; color: var(--muted); }
    .sec-label {
      font-size: 10px; font-weight: 500; letter-spacing: .08em;
      text-transform: uppercase; color: var(--mutedder);
    }

    /* --- form elements --- */
    button, input, select, textarea {
      font: inherit; color: inherit; background: transparent; border: none; outline: none;
    }
    button { cursor: pointer; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 6px; padding: 5px 10px; min-height: 26px;
      background: var(--panel-2); border: 1px solid var(--line);
      border-radius: var(--radius-sm); font-size: 12px; color: var(--text);
      transition: border-color .12s, background .12s, transform .08s;
      white-space: nowrap;
    }
    .btn:hover:not(:disabled) { border-color: var(--line-2); background: var(--panel-3); }
    .btn:active:not(:disabled) { transform: translateY(1px); }
    .btn:disabled { opacity: .35; cursor: default; }
    .btn.primary {
      background: linear-gradient(180deg, rgba(126,163,255,.22), rgba(126,163,255,.08)), var(--panel-2);
      border-color: rgba(126,163,255,.35);
    }
    .btn.primary:hover:not(:disabled) { border-color: rgba(126,163,255,.55); }
    .btn.good {
      background: linear-gradient(180deg, rgba(108,224,182,.18), rgba(108,224,182,.06)), var(--panel-2);
      border-color: rgba(108,224,182,.3);
    }
    .btn.warn {
      background: linear-gradient(180deg, rgba(244,193,102,.18), rgba(244,193,102,.05)), var(--panel-2);
      border-color: rgba(244,193,102,.3);
    }
    .btn.ghost { background: transparent; border-color: transparent; }
    .btn.ghost:hover:not(:disabled) { background: var(--panel-2); border-color: var(--line); }
    .btn.tiny { min-height: 22px; padding: 2px 8px; font-size: 11px; border-radius: 4px; }
    .btn.icon { width: 26px; padding: 0; }
    .btn.active {
      background: var(--panel-3); border-color: var(--accent-2);
      color: var(--accent);
    }

    .field {
      display: flex; flex-direction: column; gap: 4px;
    }
    .field > label {
      font-size: 10px; font-weight: 500; letter-spacing: .06em;
      text-transform: uppercase; color: var(--mutedder);
    }
    .field input[type=text], .field input[type=number], .field select, .field textarea,
    .inp {
      width: 100%; padding: 6px 9px; background: var(--panel);
      border: 1px solid var(--line); border-radius: var(--radius-sm);
      font-size: 12px; color: var(--text);
      transition: border-color .12s;
    }
    .field input:focus, .field select:focus, .field textarea:focus,
    .inp:focus { border-color: var(--accent-2); }

    input[type=range] {
      -webkit-appearance: none; appearance: none;
      height: 3px; background: var(--line); border-radius: 2px;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--accent); cursor: pointer; border: none;
    }
    input[type=range]::-moz-range-thumb {
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--accent); cursor: pointer; border: none;
    }

    input[type=file] { display: none; }

    /* --- top bar --- */
    .topbar {
      height: 44px; padding: 0 14px; flex-shrink: 0;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      z-index: 50;
    }
    .topbar .brand {
      font-size: 13px; font-weight: 500; letter-spacing: -.01em;
      color: var(--text);
    }
    .topbar .brand::after {
      content: ''; display: inline-block; width: 6px; height: 6px;
      background: var(--good); border-radius: 50%; margin-left: 8px;
      vertical-align: middle;
    }
    .topbar .divider {
      width: 1px; height: 16px; background: var(--line);
    }
    .topbar .project-name {
      background: transparent; border: 1px solid transparent;
      padding: 4px 8px; border-radius: 4px; font-size: 13px;
      font-weight: 400; min-width: 140px; color: var(--text);
    }
    .topbar .project-name:hover { border-color: var(--line); }
    .topbar .project-name:focus { border-color: var(--accent-2); background: var(--panel-2); }
    .topbar .chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 8px; background: var(--panel-2);
      border: 1px solid var(--line); border-radius: 12px;
      font-size: 11px; color: var(--muted);
    }
    .topbar .chip.live {
      color: var(--good); border-color: rgba(108,224,182,.3);
      background: rgba(108,224,182,.08);
    }
    .topbar .saved {
      font-size: 11px; color: var(--mutedder); font-family: 'Geist Mono', monospace;
    }

    /* --- workspace --- */
    .workspace {
      flex: 1;
      display: flex;
      min-height: 0;
      min-width: 0;
    }

    /* --- left rail --- */
    .rail {
      width: 200px; flex-shrink: 0;
      border-right: 1px solid var(--line);
      background: var(--panel);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .rail.collapsed { width: 44px; }
    .rail-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 10px; border-bottom: 1px solid var(--line);
      font-size: 11px; font-weight: 500; color: var(--muted);
      letter-spacing: .04em;
    }
    .rail-body {
      flex: 1; overflow-y: auto; padding: 10px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .rail.collapsed .rail-body { display: none; }

    .shelf { display: flex; flex-direction: column; gap: 6px; }
    .shelf-head {
      display: flex; align-items: center; justify-content: space-between;
      gap: 6px;
    }

    /* asset grid */
    .asset-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 5px;
    }
    .asset {
      aspect-ratio: 1; border: 1px solid var(--line);
      border-radius: var(--radius-sm); background: var(--panel-2);
      cursor: pointer; overflow: hidden; position: relative;
      transition: border-color .12s, transform .08s;
    }
    .asset:hover { border-color: var(--line-2); }
    .asset.selected { border-color: var(--accent); }
    .asset.dragging { opacity: .4; }
    .asset img, .asset video {
      width: 100%; height: 100%; object-fit: cover; display: block;
      pointer-events: none;
    }
    .asset .kind {
      position: absolute; bottom: 3px; right: 3px;
      font-family: 'Geist Mono', monospace; font-size: 8px;
      padding: 1px 4px; background: rgba(0,0,0,.65); color: #fff;
      border-radius: 2px; text-transform: uppercase; letter-spacing: .05em;
    }
    .asset .ref-flag {
      position: absolute; top: 3px; left: 3px;
      font-size: 9px; padding: 1px 5px;
      background: var(--warn); color: #000;
      border-radius: 2px; font-weight: 500;
    }
    .asset .converting-badge {
      position: absolute; top: 3px; left: 3px;
      font-size: 11px; padding: 1px 4px;
      background: rgba(126,163,255,.9); color: #fff;
      border-radius: 2px; font-weight: 700;
      animation: spin-badge .8s linear infinite;
      display: inline-block;
    }
    @keyframes spin-badge { to { transform: rotate(360deg); } }
    .asset-placeholder {
      aspect-ratio: 1; border: 1px dashed var(--line-2);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      color: var(--mutedder); font-size: 16px;
      cursor: pointer;
      transition: border-color .12s;
    }
    .asset-placeholder:hover { border-color: var(--accent-2); color: var(--accent); }
    .asset-empty {
      grid-column: 1 / -1;
      padding: 16px 4px; text-align: center;
      color: var(--mutedder); font-size: 11px;
      line-height: 1.5;
    }

    /* color ref strip */
    .ref-strip {
      display: flex; gap: 4px; flex-wrap: wrap;
    }
    .ref-chip {
      width: 34px; height: 34px; border-radius: var(--radius-sm);
      border: 1px solid var(--line); overflow: hidden;
      cursor: pointer; position: relative;
      transition: border-color .12s;
    }
    .ref-chip:hover { border-color: var(--line-2); }
    .ref-chip.active { border-color: var(--warn); box-shadow: 0 0 0 1px rgba(244,193,102,.3); }
    .ref-chip img { width: 100%; height: 100%; object-fit: cover; }
    .ref-chip .rm {
      position: absolute; top: -4px; right: -4px;
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--bad); color: #000;
      font-size: 10px; font-weight: 600;
      display: none; align-items: center; justify-content: center;
      border: 1px solid var(--bg);
    }
    .ref-chip:hover .rm { display: flex; }

    /* brand shelf */
    .brand-box {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 8px; background: var(--panel-2);
      border: 1px solid var(--line); border-radius: var(--radius-sm);
    }
    .brand-box img {
      width: 24px; height: 24px; object-fit: contain;
      background: #fff2; border-radius: 3px; flex-shrink: 0;
    }
    .brand-box .name {
      font-size: 11px; color: var(--muted);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* --- preview --- */
    .stage-wrap {
      flex: 1; display: flex; flex-direction: column;
      min-width: 0; min-height: 0;
      overflow: hidden;
    }
    .stage {
      flex: 1; display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
      background: radial-gradient(ellipse at center, #0d1018 0%, #06080d 85%);
      min-height: 0; min-width: 0;
      padding: 20px;
    }
    .stage-canvas {
      position: relative;
      background: #000;
      /* dimensions are set inline by PreviewStage (fit to stage, preserve format ratio) */
      box-shadow: 0 20px 60px rgba(0,0,0,.6), 0 0 0 1px var(--line);
      border-radius: 2px;
      overflow: hidden;
      cursor: grab;
      flex-shrink: 0;
    }
    .stage-canvas.dragging { cursor: grabbing; }
    .stage-canvas.no-drag { cursor: default; }
    .stage-shot {
      /* the transformed layer (scale + offset) — sits inside the locked frame */
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      transform-origin: center center;
    }
    .stage-video, .stage-img, .stage-audio-viz {
      width: 100%; height: 100%; display: block;
      background: #000;
      object-fit: contain;
    }
    /* GL canvas: sits on top of the source, same box, renders the graded output. */
    .stage-gl-canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      display: block;
      pointer-events: none;
    }
    /* GL canvas sits on top when active — video stays visible as fallback if GL fails */
    .stage-shot.gl-active .stage-video,
    .stage-shot.gl-active .stage-img {
      opacity: 1;
    }

    /* corner resize handles on the main shot */
    .resize-corner {
      position: absolute;
      width: 16px; height: 16px;
      z-index: 6;
      pointer-events: auto;
    }
    .resize-corner::after {
      content: '';
      position: absolute; inset: 5px;
      border: 1.5px solid var(--accent);
      background: rgba(126,163,255,.15);
      border-radius: 2px;
      transition: transform .12s, background .12s, border-color .12s;
    }
    .resize-corner:hover::after { transform: scale(1.25); background: rgba(126,163,255,.4); border-color: var(--text); }
    .resize-corner.tl { top: 4px; left: 4px; cursor: nwse-resize; }
    .resize-corner.tr { top: 4px; right: 4px; cursor: nesw-resize; }
    .resize-corner.bl { bottom: 4px; left: 4px; cursor: nesw-resize; }
    .resize-corner.br { bottom: 4px; right: 4px; cursor: nwse-resize; }

    /* rule-of-thirds grid overlay */
    .stage-grid {
      position: absolute; inset: 0;
      pointer-events: none; z-index: 4;
      background-image:
        linear-gradient(to right, transparent 33.33%, rgba(255,255,255,.25) 33.33%, rgba(255,255,255,.25) 33.66%, transparent 33.66%, transparent 66.33%, rgba(255,255,255,.25) 66.33%, rgba(255,255,255,.25) 66.66%, transparent 66.66%),
        linear-gradient(to bottom, transparent 33.33%, rgba(255,255,255,.25) 33.33%, rgba(255,255,255,.25) 33.66%, transparent 33.66%, transparent 66.33%, rgba(255,255,255,.25) 66.33%, rgba(255,255,255,.25) 66.66%, transparent 66.66%);
    }
    .stage-grid::after {
      /* center crosshair */
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 18px; height: 18px;
      transform: translate(-50%, -50%);
      border: 1px solid rgba(255,255,255,.35);
      border-radius: 50%;
    }
    .grid-toggle {
      position: absolute; bottom: 10px; right: 10px;
      z-index: 8;
      padding: 3px 8px; font-size: 10px;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 12px;
      color: #fff; opacity: .45;
      transition: opacity .15s;
      cursor: pointer;
    }
    .grid-toggle:hover { opacity: 1; }
    .grid-toggle.active { opacity: 1; border-color: var(--accent); color: var(--accent); }

    /* overlay clip on stage — gets resize handles when selected */
    .stage-overlay-wrap {
      position: absolute;
      z-index: 3;
    }
    .stage-overlay-wrap.selected {
      outline: 1px dashed var(--accent);
      outline-offset: 2px;
    }
    .stage-overlay-wrap.selected .resize-corner { display: block; }
    .stage-overlay-wrap .resize-corner { display: none; }

    /* clip dot for match queue */
    .clip-queued-dot {
      position: absolute; top: 4px; left: 4px;
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--warn);
      box-shadow: 0 0 4px rgba(244,193,102,.8);
      z-index: 3;
    }

    /* ───── transitions ───── */
    /* Layer that sits above stage-shot during a transition to render incoming clip */
    .stage-transition-layer {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
      z-index: 5;
    }
    .stage-transition-media {
      width: 100%; height: 100%;
      object-fit: contain;
      background: #000;
    }
    /* Timeline: diamond between clips indicating transition */
    .transition-marker {
      position: absolute; top: 50%;
      width: 16px; height: 16px;
      transform: translate(-50%, -50%) rotate(45deg);
      background: var(--panel-3);
      border: 1.5px solid var(--line-2);
      cursor: pointer;
      z-index: 15;
      transition: background .15s, border-color .15s, transform .15s;
      display: flex; align-items: center; justify-content: center;
    }
    .transition-marker:hover {
      background: var(--panel);
      border-color: var(--accent);
      transform: translate(-50%, -50%) rotate(45deg) scale(1.15);
    }
    .transition-marker.active {
      background: var(--accent);
      border-color: var(--accent);
    }
    .transition-marker.active::after {
      content: '';
      width: 5px; height: 5px;
      background: var(--bg);
      border-radius: 50%;
    }
    .transition-popover {
      position: fixed;
      background: var(--panel-2);
      border: 1px solid var(--line-2);
      border-radius: var(--radius);
      box-shadow: 0 20px 40px rgba(0,0,0,.5);
      z-index: 250;
      padding: 10px;
      min-width: 220px;
    }
    .transition-popover .trans-row {
      display: grid; grid-template-columns: 1fr;
      gap: 2px;
    }
    .transition-popover .trans-opt {
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      transition: background .1s, color .1s;
      display: flex; align-items: center; gap: 8px;
    }
    .transition-popover .trans-opt:hover { background: var(--panel-3); color: var(--text); }
    .transition-popover .trans-opt.active { color: var(--accent); background: rgba(126,163,255,.08); }
    .transition-popover .trans-opt .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--line-2);
      flex-shrink: 0;
    }
    .transition-popover .trans-opt.active .dot { background: var(--accent); }
    .stage-audio-viz {
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 12px;
    }
    .stage-overlay {
      position: absolute; pointer-events: none;
      max-width: 30%; max-height: 30%;
      object-fit: contain;
    }
    .stage-empty {
      color: var(--mutedder); font-size: 13px;
      text-align: center; padding: 32px;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
    }
    .stage-empty .icon {
      width: 56px; height: 56px; border-radius: 50%;
      border: 1.5px dashed var(--line-2);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; color: var(--mutedder);
    }
    .stage-badge {
      position: absolute; top: 12px; left: 12px;
      padding: 4px 10px; background: rgba(0,0,0,.55);
      backdrop-filter: blur(8px);
      border-radius: 12px; font-size: 10px;
      font-family: 'Geist Mono', monospace;
      color: #fff; letter-spacing: .05em;
    }
    .stage-tc {
      position: absolute; top: 12px; right: 12px;
      padding: 4px 10px; background: rgba(0,0,0,.55);
      backdrop-filter: blur(8px);
      border-radius: 12px; font-size: 10px;
      font-family: 'Geist Mono', monospace;
      color: #fff;
    }

    /* transport */
    .transport {
      flex-shrink: 0;
      padding: 10px 14px;
      display: flex; align-items: center; gap: 12px;
      background: var(--panel);
      border-top: 1px solid var(--line);
    }
    .transport .scrub {
      flex: 1; position: relative; height: 24px;
      display: flex; align-items: center;
    }
    .transport .scrub input[type=range] {
      width: 100%;
    }
    .tc {
      font-family: 'Geist Mono', monospace; font-size: 11px;
      color: var(--muted); white-space: nowrap;
    }

    /* --- timeline --- */
    .timeline-wrap {
      height: 220px; flex-shrink: 0;
      border-top: 1px solid var(--line);
      background: var(--panel);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .timeline-head {
      height: 32px; padding: 0 12px; flex-shrink: 0;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid var(--line);
    }
    .timeline-head .zoom-group {
      display: flex; align-items: center; gap: 6px;
    }
    .timeline-head .zoom-group input[type=range] {
      width: 80px;
    }

    .timeline-body {
      flex: 1; overflow-x: auto; overflow-y: hidden;
      position: relative;
    }
    .ruler {
      height: 22px; position: sticky; top: 0; z-index: 5;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      display: flex; align-items: flex-end;
      padding-bottom: 3px;
      position: relative;
    }
    .ruler-tick {
      position: absolute; top: 0; bottom: 0;
      border-left: 1px solid var(--line);
      padding-left: 4px;
      font-family: 'Geist Mono', monospace;
      font-size: 9px; color: var(--mutedder);
      display: flex; align-items: flex-end; padding-bottom: 2px;
    }

    .lanes {
      position: relative;
    }

    .lane {
      height: 48px; position: relative;
      display: flex; align-items: stretch;
      border-bottom: 1px solid var(--line);
    }
    .lane:last-child { border-bottom: none; }
    .lane-label {
      width: 60px; flex-shrink: 0;
      padding: 0 8px; display: flex; flex-direction: column; justify-content: center;
      background: var(--panel);
      border-right: 1px solid var(--line);
      font-size: 10px; color: var(--muted); font-weight: 500;
      text-transform: uppercase; letter-spacing: .05em;
      position: sticky; left: 0; z-index: 4;
    }
    .lane-label .hint {
      font-size: 9px; color: var(--mutedder);
      text-transform: none; letter-spacing: 0;
      font-weight: 400;
    }
    .lane-track {
      flex: 1; position: relative; background: var(--panel-2);
      min-width: 600px;
    }
    .playhead {
      position: absolute; top: 0; bottom: 0;
      width: 20px;
      transform: translateX(-10px);
      cursor: ew-resize;
      z-index: 22;
    }
    .playhead.dragging { cursor: grabbing; }
    .playhead-line {
      position: absolute; left: 10px; top: 0; bottom: 0;
      width: 1px; background: var(--good);
      box-shadow: 0 0 6px rgba(108,224,182,.7);
      pointer-events: none;
    }
    .playhead-head {
      position: absolute; left: 5px; top: -3px;
      width: 11px; height: 11px;
      background: var(--good);
      transform: rotate(45deg);
      pointer-events: none;
      box-shadow: 0 0 6px rgba(108,224,182,.5);
    }
    .playhead:hover .playhead-line { box-shadow: 0 0 10px rgba(108,224,182,.9); }
    .playhead:hover .playhead-head { transform: rotate(45deg) scale(1.15); }

    .clip {
      position: absolute; top: 4px; bottom: 4px;
      border-radius: var(--radius-sm);
      overflow: hidden;
      cursor: grab;
      transition: border-color .1s, box-shadow .1s;
      display: flex; flex-direction: column;
    }
    .clip:active { cursor: grabbing; }
    .clip.main-clip {
      background: hsl(var(--main-hue), 40%, 28%);
      border: 1px solid hsl(var(--main-hue), 50%, 42%);
    }
    .clip.overlay-clip {
      background: hsl(var(--overlay-hue), 35%, 22%);
      border: 1px solid hsl(var(--overlay-hue), 50%, 38%);
    }
    .clip.music-clip {
      background: hsl(var(--music-hue), 35%, 22%);
      border: 1px solid hsl(var(--music-hue), 50%, 40%);
    }
    .clip.selected {
      box-shadow: 0 0 0 1px var(--accent), 0 0 10px rgba(126,163,255,.25);
      border-color: var(--accent);
    }
    .clip.active-play {
      box-shadow: 0 0 0 1px var(--good), inset 0 0 0 1px rgba(108,224,182,.2);
    }
    .clip-thumb {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
      opacity: .32; pointer-events: none;
    }
    .clip-body {
      position: relative; z-index: 2;
      flex: 1; padding: 3px 10px 3px 8px;
      display: flex; flex-direction: column; justify-content: space-between;
      overflow: hidden;
      pointer-events: none;
    }
    .clip-label {
      font-size: 10px; font-weight: 500; color: #fff;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      line-height: 1.2;
    }
    .clip-meta {
      font-family: 'Geist Mono', monospace;
      font-size: 9px; color: rgba(255,255,255,.75);
    }
    .clip-handle {
      position: absolute; top: 0; bottom: 0; width: 6px;
      cursor: ew-resize; z-index: 10;
      display: flex; align-items: center; justify-content: center;
    }
    .clip-handle::after {
      content: ''; width: 2px; height: 50%;
      background: rgba(255,255,255,.5);
      border-radius: 1px;
    }
    .clip-handle:hover::after { background: #fff; }
    .clip-handle.left { left: 0; }
    .clip-handle.right { right: 0; }
    .clip-speed-badge {
      position: absolute; top: 2px; right: 10px;
      font-family: 'Geist Mono', monospace;
      font-size: 8px; color: var(--warn);
      font-weight: 500;
      z-index: 3;
    }
    .clip-grade-dot {
      position: absolute; top: 4px; right: 4px;
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 4px rgba(126,163,255,.7);
      z-index: 3;
    }

    .drop-indicator {
      position: absolute; top: 2px; bottom: 2px;
      width: 2px; background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      z-index: 15; pointer-events: none;
    }

    /* --- right drawer --- */
    .drawer {
      width: 320px; flex-shrink: 0;
      border-left: 1px solid var(--line);
      background: var(--panel);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .drawer.collapsed { width: 0; border-left: none; }
    .drawer-tabs {
      display: flex; flex-shrink: 0;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    .drawer-tab {
      flex: 1; padding: 11px 8px; font-size: 11px;
      color: var(--muted); font-weight: 500;
      border-bottom: 2px solid transparent;
      text-align: center; cursor: pointer;
      transition: color .12s, border-color .12s;
    }
    .drawer-tab:hover { color: var(--text); }
    .drawer-tab.active {
      color: var(--text); border-bottom-color: var(--accent);
    }
    .drawer-body {
      flex: 1; overflow-y: auto; padding: 14px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .drawer-body h3 {
      font-size: 12px; font-weight: 500; color: var(--text);
      margin-bottom: 6px;
    }
    .drawer-body p.hint {
      font-size: 11px; color: var(--muted); line-height: 1.5;
    }

    /* CG sliders */
    .slider-row {
      display: grid; grid-template-columns: 70px 1fr 42px;
      gap: 8px; align-items: center;
    }
    .slider-row label {
      font-size: 11px; color: var(--muted);
    }
    .slider-row .val {
      font-family: 'Geist Mono', monospace;
      font-size: 10px; color: var(--muted); text-align: right;
    }
    .preset-row {
      display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px;
    }
    .preset-chip {
      padding: 3px 8px; font-size: 10px;
      background: var(--panel-2); border: 1px solid var(--line);
      border-radius: 4px; color: var(--muted); cursor: pointer;
      transition: border-color .12s, color .12s;
    }
    .preset-chip:hover { border-color: var(--line-2); color: var(--text); }
    .preset-chip.active { border-color: var(--accent); color: var(--accent); background: rgba(126,163,255,.08); }

    /* AI tab cards */
    .ai-card {
      padding: 10px 12px; background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      display: flex; flex-direction: column; gap: 6px;
    }
    .ai-card h4 {
      font-size: 12px; font-weight: 500;
    }
    .ai-card .desc {
      font-size: 10px; color: var(--muted); line-height: 1.4;
    }
    .ai-card .row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .ai-card.real { border-color: rgba(108,224,182,.25); }
    .ai-card.stub { opacity: .85; }
    .ai-card .stub-tag {
      font-size: 9px; padding: 1px 5px; background: var(--line);
      border-radius: 3px; color: var(--muted);
      font-family: 'Geist Mono', monospace; letter-spacing: .05em;
    }

    /* brief */
    .brief-box {
      flex: 1; padding: 10px;
      background: var(--panel-2);
      border: 1px solid var(--line); border-radius: var(--radius-sm);
      font-family: 'Geist Mono', monospace;
      font-size: 10px; color: var(--muted);
      white-space: pre-wrap; line-height: 1.55;
      overflow: auto; min-height: 200px;
    }

    /* match tab */
    .match-preview {
      display: flex; gap: 6px; padding: 8px;
      background: var(--panel-2); border: 1px solid var(--line);
      border-radius: var(--radius-sm);
    }
    .swatch-stack {
      display: flex; flex-direction: column; gap: 2px; flex: 1;
    }
    .swatch-row {
      display: flex; gap: 2px; height: 14px;
    }
    .swatch-dot {
      flex: 1; border-radius: 2px; min-width: 8px;
    }
    .swatch-label {
      font-size: 9px; color: var(--mutedder);
      font-family: 'Geist Mono', monospace; letter-spacing: .05em;
    }

    /* --- contextual toolbar --- */
    .toolbar {
      height: 52px; flex-shrink: 0;
      padding: 0 14px; display: flex; align-items: center; gap: 12px;
      border-top: 1px solid var(--line);
      background: var(--panel);
      overflow-x: auto;
    }
    .toolbar-context {
      font-size: 10px; font-weight: 500; letter-spacing: .08em;
      text-transform: uppercase; color: var(--mutedder);
      white-space: nowrap;
    }
    .toolbar-divider {
      width: 1px; height: 20px; background: var(--line); flex-shrink: 0;
    }
    .toolbar-group {
      display: flex; align-items: center; gap: 6px; flex-shrink: 0;
    }
    .toolbar-spacer { flex: 1; min-width: 10px; }

    .inline-field {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 8px; background: var(--panel-2);
      border: 1px solid var(--line); border-radius: 4px;
      font-size: 11px; color: var(--muted);
      white-space: nowrap;
    }
    .inline-field .label {
      color: var(--mutedder); font-size: 10px;
    }
    .inline-field input[type=number] {
      width: 44px; padding: 2px 4px; background: transparent;
      border: none; text-align: right;
      font-family: 'Geist Mono', monospace; font-size: 11px;
      color: var(--text);
    }
    .inline-field input[type=number]:focus { outline: 1px solid var(--accent-2); }

    /* export menu */
    .menu-wrap { position: relative; }
    .menu {
      position: absolute; top: calc(100% + 4px); right: 0;
      min-width: 240px; background: var(--panel-2);
      border: 1px solid var(--line-2); border-radius: var(--radius);
      box-shadow: 0 20px 40px rgba(0,0,0,.5);
      z-index: 100; overflow: hidden;
      padding: 4px;
    }
    .menu-item {
      padding: 9px 12px; cursor: pointer;
      border-radius: var(--radius-sm);
      display: flex; align-items: flex-start; gap: 10px;
      transition: background .1s;
    }
    .menu-item:hover { background: var(--panel-3); }
    .menu-item:disabled { opacity: .4; cursor: default; }
    .menu-item .menu-title {
      font-size: 12px; font-weight: 500; color: var(--text);
    }
    .menu-item .menu-desc {
      font-size: 10px; color: var(--muted); margin-top: 2px;
    }
    .menu-divider { height: 1px; background: var(--line); margin: 4px 0; }

    /* modal */
    .modal-backdrop {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(5,7,12,.8); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
    }
    .modal {
      background: var(--panel-2); border: 1px solid var(--line-2);
      border-radius: var(--radius-lg); padding: 24px;
      min-width: 400px; max-width: 540px;
      box-shadow: 0 30px 80px rgba(0,0,0,.6);
    }
    .modal h2 {
      font-size: 15px; font-weight: 500; margin-bottom: 14px;
    }
    .modal p {
      font-size: 12px; color: var(--muted); line-height: 1.6;
      margin-bottom: 14px;
    }
    .modal .progress-bar {
      height: 6px; background: var(--line); border-radius: 3px;
      overflow: hidden; margin-bottom: 10px;
    }
    .modal .progress-fill {
      height: 100%; background: var(--accent);
      transition: width .2s;
    }
    .modal .log {
      font-family: 'Geist Mono', monospace; font-size: 10px;
      color: var(--mutedder); max-height: 120px; overflow: auto;
      background: var(--panel); padding: 8px; border-radius: 4px;
      white-space: pre-wrap;
    }
    .modal .row-end {
      display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px;
    }

    /* toast */
    .toast-container {
      position: fixed; bottom: 24px; right: 24px; z-index: 300;
      display: flex; flex-direction: column; gap: 8px;
      pointer-events: none;
    }
    .toast {
      padding: 10px 14px; background: var(--panel-2);
      border: 1px solid var(--line-2); border-radius: var(--radius);
      font-size: 12px; color: var(--text);
      box-shadow: 0 10px 30px rgba(0,0,0,.4);
      min-width: 220px;
      animation: toast-in .2s ease-out;
    }
    .toast.good { border-color: rgba(108,224,182,.35); }
    .toast.warn { border-color: rgba(244,193,102,.35); }
    .toast.bad { border-color: rgba(255,122,133,.35); }
    @keyframes toast-in {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* responsive */
    @media (max-width: 1100px) {
      .drawer { width: 280px; }
      .rail { width: 170px; }
    }
    @media (max-width: 900px) {
      .rail, .drawer { display: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.3.1",
        "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
        "@ffmpeg/ffmpeg": "https://esm.sh/@ffmpeg/ffmpeg@0.12.10",
        "@ffmpeg/util": "https://esm.sh/@ffmpeg/util@0.12.1",
        "@imgly/background-removal": "https://esm.sh/@imgly/background-removal@1.6.0"
      }
    }
  </script>

  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

  <script type="text/babel" data-type="module" data-presets="react">
    import React, { useState, useEffect, useLayoutEffect, useRef, useReducer, useCallback, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';

    // ──────────────────────────────────────────────────────────────
    //   CONSTANTS
    // ──────────────────────────────────────────────────────────────
    const STORAGE_KEY = 'reel-lab-v7';
    const FORMATS = {
      '9:16': { w: 1080, h: 1920, label: '9:16 portrait' },
      '1:1':  { w: 1080, h: 1080, label: '1:1 square' },
      '16:9': { w: 1920, h: 1080, label: '16:9 landscape' },
    };
    const GRADE_PRESETS = {
      flat:           { brightness: 1.00, contrast: 1.00, saturate: 1.00, blacks: 0.00 },
      'premium dark': { brightness: 0.95, contrast: 1.25, saturate: 1.15, blacks: -0.08 },
      punchy:         { brightness: 1.03, contrast: 1.32, saturate: 1.28, blacks: -0.05 },
      soft:           { brightness: 1.08, contrast: 0.92, saturate: 0.92, blacks: 0.04 },
    };
    const SPEED_PRESETS = [0.25, 0.5, 0.75, 1, 1.5, 2, 4, 8];

    // Transitions — how a clip enters from the previous one.
    // Each has: id, label, maxDuration, and ffmpeg name (for xfade).
    const TRANSITIONS = {
      cut:        { label: 'Cut',          maxDur: 0,   ffmpeg: null },
      dissolve:   { label: 'Dissolve',     maxDur: 2,   ffmpeg: 'fade' },
      fadeBlack:  { label: 'Fade to black',maxDur: 2,   ffmpeg: 'fadeblack' },
      fadeWhite:  { label: 'Dip to white', maxDur: 2,   ffmpeg: 'fadewhite' },
      wipeLeft:   { label: 'Wipe ←',       maxDur: 1.5, ffmpeg: 'wipeleft' },
      wipeRight:  { label: 'Wipe →',       maxDur: 1.5, ffmpeg: 'wiperight' },
      whipBlur:   { label: 'Whip blur',    maxDur: 0.8, ffmpeg: 'smoothleft' },
    };
    const DEFAULT_TRANSITION_DUR = 0.5;

    // ──────────────────────────────────────────────────────────────
    //   STATE & REDUCER
    // ──────────────────────────────────────────────────────────────
    function defaultState() {
      return {
        projectName: 'Fire and Ash Reel',
        format: '9:16',
        targetLength: 15,
        assets: [], // {id, name, kind, url, sizeLabel, isRef, isBrand}
        savedMeta: [], // for persistence (blob urls die)
        tracks: {
          overlay: [], // clips on overlay lane
          main: [],    // clips on main lane (sequential)
          music: [],   // music track
        },
        playhead: 0,
        isPlaying: false,
        zoom: 1,
        selection: { track: null, itemId: null },
        currentPreviewAssetId: null,
        showGrid: false, // rule-of-thirds on preview
        // project-wide grade (applied to preview, bakeable to clips)
        projectGrade: { brightness: 1, contrast: 1, saturate: 1, blacks: 0, warmth: 0, preset: 'flat' },
        // tone match: ref palette + strength + queue of clip ids to receive matched grade
        colorMatch: { refAssetId: null, strength: 0.4, refPalette: null, queue: [] },
        // music bed options
        music: { volume: 0.8, fadeIn: 0.3, fadeOut: 0.5, loopIfShort: true, muteMainOnMusic: true },
        // notes
        sessionNotes: '',
      };
    }

    function reducer(state, action) {
      switch (action.type) {
        case 'REPLACE':
          return action.state;
        case 'PATCH':
          return { ...state, ...action.patch };
        case 'ADD_ASSETS': {
          const next = [...state.assets, ...action.assets];
          return { ...state, assets: next, currentPreviewAssetId: state.currentPreviewAssetId || action.assets[0]?.id || null };
        }
        case 'REMOVE_ASSET': {
          const next = state.assets.filter(a => a.id !== action.id);
          const stripTracks = { ...state.tracks };
          Object.keys(stripTracks).forEach(t => {
            stripTracks[t] = stripTracks[t].filter(c => c.assetId !== action.id);
          });
          return {
            ...state,
            assets: next,
            tracks: stripTracks,
            currentPreviewAssetId: state.currentPreviewAssetId === action.id ? (next[0]?.id || null) : state.currentPreviewAssetId,
          };
        }
        case 'UPDATE_ASSET': {
          const next = state.assets.map(a => a.id === action.id ? { ...a, ...action.patch } : a);
          return { ...state, assets: next };
        }
        case 'TOGGLE_REF': {
          const next = state.assets.map(a => a.id === action.id ? { ...a, isRef: !a.isRef } : a);
          return { ...state, assets: next };
        }
        case 'SET_BRAND_ASSET': {
          // only one brand asset at a time
          const next = state.assets.map(a => ({ ...a, isBrand: a.id === action.id ? !a.isBrand : false }));
          return { ...state, assets: next };
        }
        case 'SET_PREVIEW':
          return { ...state, currentPreviewAssetId: action.id };
        case 'ADD_CLIP': {
          const newTracks = { ...state.tracks };
          newTracks[action.track] = [...newTracks[action.track], action.clip];
          return { ...state, tracks: newTracks, selection: { track: action.track, itemId: action.clip.id } };
        }
        case 'UPDATE_CLIP': {
          const newTracks = { ...state.tracks };
          newTracks[action.track] = newTracks[action.track].map(c =>
            c.id === action.id ? { ...c, ...action.patch } : c
          );
          return { ...state, tracks: newTracks };
        }
        case 'REMOVE_CLIP': {
          const newTracks = { ...state.tracks };
          newTracks[action.track] = newTracks[action.track].filter(c => c.id !== action.id);
          const nextSel = (state.selection.track === action.track && state.selection.itemId === action.id)
            ? { track: null, itemId: null } : state.selection;
          return { ...state, tracks: newTracks, selection: nextSel };
        }
        case 'REORDER_CLIPS': {
          const newTracks = { ...state.tracks };
          const items = [...newTracks[action.track]];
          const [moved] = items.splice(action.from, 1);
          items.splice(action.to, 0, moved);
          newTracks[action.track] = items;
          return { ...state, tracks: newTracks };
        }
        case 'SPLIT_CLIP': {
          // only for main track
          const items = state.tracks.main;
          const idx = items.findIndex(c => c.id === action.id);
          if (idx < 0) return state;
          const orig = items[idx];
          const starts = getMainStarts(items);
          const clipStart = starts[idx];
          const localOffset = state.playhead - clipStart;
          if (localOffset <= 0.05 || localOffset >= orig.duration - 0.05) return state;
          const a = { ...orig, duration: round2(localOffset) };
          const b = {
            ...orig,
            id: newId('clip'),
            trimStart: round2(orig.trimStart + localOffset),
            duration: round2(orig.duration - localOffset),
          };
          const newMain = [...items.slice(0, idx), a, b, ...items.slice(idx + 1)];
          return {
            ...state,
            tracks: { ...state.tracks, main: newMain },
            selection: { track: 'main', itemId: b.id },
          };
        }
        case 'SET_PLAYHEAD':
          return { ...state, playhead: Math.max(0, action.t) };
        case 'SET_PLAYING':
          return { ...state, isPlaying: action.playing };
        case 'SET_ZOOM':
          return { ...state, zoom: Math.max(0.25, Math.min(20, action.zoom)) };
        case 'SELECT':
          return { ...state, selection: { track: action.track, itemId: action.itemId } };
        case 'PATCH_GRADE':
          return { ...state, projectGrade: { ...state.projectGrade, ...action.patch, preset: action.preset || 'custom' } };
        case 'APPLY_GRADE_PRESET': {
          const p = GRADE_PRESETS[action.preset];
          return { ...state, projectGrade: { ...p, preset: action.preset } };
        }
        case 'PATCH_COLOR_MATCH':
          return { ...state, colorMatch: { ...state.colorMatch, ...action.patch } };
        case 'PATCH_MUSIC':
          return { ...state, music: { ...state.music, ...action.patch } };
        default:
          return state;
      }
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return defaultState();
        const p = JSON.parse(raw);
        const d = defaultState();
        return {
          ...d,
          ...p,
          assets: [], // blob urls die between sessions
          savedMeta: p.savedMeta || [],
          // tracks reference dead asset IDs, so reset — settings below still persist
          tracks: { overlay: [], main: [], music: [] },
          projectGrade: { ...d.projectGrade, ...(p.projectGrade || {}) },
          colorMatch: { ...d.colorMatch, ...(p.colorMatch || {}), refAssetId: null, refPalette: null, queue: [] },
          music: { ...d.music, ...(p.music || {}) },
          selection: { track: null, itemId: null },
          playhead: 0,
          isPlaying: false,
          currentPreviewAssetId: null,
          showGrid: p.showGrid || false,
        };
      } catch { return defaultState(); }
    }

    function persistState(state) {
      const savedMeta = state.assets.map(a => ({ name: a.name, kind: a.kind, sizeLabel: a.sizeLabel, isRef: a.isRef, isBrand: a.isBrand }));
      const snap = {
        projectName: state.projectName,
        format: state.format,
        targetLength: state.targetLength,
        savedMeta,
        tracks: state.tracks,
        projectGrade: state.projectGrade,
        colorMatch: { ...state.colorMatch, refPalette: null, queue: [] }, // don't persist palette or queue
        music: state.music,
        sessionNotes: state.sessionNotes,
        zoom: state.zoom,
        showGrid: state.showGrid,
      };
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(snap)); } catch (e) { console.warn('persist fail', e); }
    }

    // ──────────────────────────────────────────────────────────────
    //   HELPERS
    // ──────────────────────────────────────────────────────────────
    const round2 = (n) => Math.round(Number(n) * 100) / 100;
    const round1 = (n) => Math.round(Number(n) * 10) / 10;
    const newId = (prefix = 'id') => `${prefix}-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 7)}`;

    const fmtTC = (sec) => {
      sec = Math.max(0, Number(sec) || 0);
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60);
      const cs = Math.floor((sec - Math.floor(sec)) * 100);
      return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}.${String(cs).padStart(2, '0')}`;
    };

    const fmtBytes = (b) => {
      const u = ['B', 'KB', 'MB', 'GB']; let i = 0;
      while (b >= 1024 && i < u.length - 1) { b /= 1024; i++; }
      return `${b.toFixed(b >= 10 || i === 0 ? 0 : 1)} ${u[i]}`;
    };

    const getKind = (type, name) => {
      if (type.startsWith('video')) return 'video';
      if (type.startsWith('image')) return 'image';
      if (type.startsWith('audio')) return 'audio';
      const l = name.toLowerCase();
      if (/\.(mp3|wav|m4a|aac|ogg|flac)$/.test(l)) return 'audio';
      if (/\.(png|jpg|jpeg|webp|gif|avif)$/.test(l)) return 'image';
      return 'video';
    };

    const getMainStarts = (items) => {
      let acc = 0;
      return items.map(c => { const s = acc; acc += Number(c.duration || 0); return s; });
    };

    const getReelLength = (state) => {
      const mainLen = state.tracks.main.reduce((s, c) => s + Number(c.duration || 0), 0);
      return Math.max(mainLen, 0.1);
    };

    const getActiveClipAt = (state, track, t) => {
      const items = state.tracks[track];
      if (track === 'main') {
        const starts = getMainStarts(items);
        for (let i = 0; i < items.length; i++) {
          const start = starts[i];
          const end = start + Number(items[i].duration || 0);
          if (t >= start && t < end) return { clip: items[i], index: i, start, localT: t - start };
        }
        return null;
      } else {
        // overlay and music: absolute start from clip.start
        for (let i = 0; i < items.length; i++) {
          const c = items[i];
          const start = Number(c.start || 0);
          const end = start + Number(c.duration || 0);
          if (t >= start && t < end) return { clip: c, index: i, start, localT: t - start };
        }
        return null;
      }
    };

    // If playhead is within a transition window between two main clips, return
    //   { outgoing, incoming, progress (0..1), type }
    // Otherwise null. Transition is centered on the boundary.
    const getActiveTransition = (state, t) => {
      const items = state.tracks.main;
      if (items.length < 2) return null;
      const starts = getMainStarts(items);
      for (let i = 1; i < items.length; i++) {
        const tIn = items[i].transitionIn;
        if (!tIn || tIn.type === 'cut' || !tIn.duration) continue;
        const boundary = starts[i];
        const half = tIn.duration / 2;
        if (t >= boundary - half && t <= boundary + half) {
          const progress = Math.max(0, Math.min(1, (t - (boundary - half)) / tIn.duration));
          return {
            outgoing: items[i - 1],
            outgoingIndex: i - 1,
            outgoingStart: starts[i - 1],
            incoming: items[i],
            incomingIndex: i,
            incomingStart: starts[i],
            progress,
            type: tIn.type,
            duration: tIn.duration,
            boundary,
          };
        }
      }
      return null;
    };

    // css filter string from grade + toneMatch
    // Tone match applies: saturation nudge + brightness nudge + warmth (sepia when warm).
    // NO hue-rotate — that just spins the color wheel.
    // Manual warmth (from grade.warmth, -1..1) also applies here: positive = sepia warm,
    // negative = cool (simulated by reducing red via hue-rotate on the blue side, which is
    // visually close enough for this scale).
    const gradeToFilter = (g, matchDelta, strength) => {
      let parts = [];
      parts.push(`brightness(${g.brightness})`);
      parts.push(`contrast(${g.contrast})`);
      parts.push(`saturate(${g.saturate})`);

      // manual warmth from the grade itself
      const manualWarm = Number(g.warmth || 0);
      if (manualWarm > 0.02) {
        parts.push(`sepia(${(manualWarm * 0.5).toFixed(3)})`);
      } else if (manualWarm < -0.02) {
        // cool: a tiny hue-rotate gives us blue bias without the ugly full-wheel effect,
        // because we're only doing ±15° max.
        const deg = manualWarm * 15; // -15° max toward blue
        parts.push(`hue-rotate(${deg.toFixed(1)}deg)`);
      }

      if (matchDelta && strength > 0) {
        const s = Math.max(0, Math.min(1, strength));
        const satMul = 1 + ((matchDelta.saturation / 0.3) - 1) * s * 0.5;
        const brMul  = 1 + ((matchDelta.lightness  / 0.5) - 1) * s * 0.4;
        const warmth = matchDelta.warmth;
        const sepiaAmt = Math.max(0, warmth) * s * 0.4;
        parts.push(`saturate(${Math.max(0, Math.min(3, satMul)).toFixed(3)})`);
        parts.push(`brightness(${Math.max(0.3, Math.min(2, brMul)).toFixed(3)})`);
        if (sepiaAmt > 0.02) parts.push(`sepia(${sepiaAmt.toFixed(3)})`);
      }
      return parts.join(' ');
    };

    // sample a reference image — weight pixels by saturation so dark backgrounds
    // don't dominate the "average color" of a subject on black.
    async function extractPalette(imgSrc) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => {
          const w = 64, h = 64;
          const c = document.createElement('canvas');
          c.width = w; c.height = h;
          const ctx = c.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          const data = ctx.getImageData(0, 0, w, h).data;

          // unweighted overall averages (for brightness/lightness feel)
          let rs = 0, gs = 0, bs = 0, n = 0;
          // saturation-weighted averages (for hue/warmth detection)
          let rW = 0, gW = 0, bW = 0, wSum = 0;
          const swatches = [];
          for (let i = 0; i < data.length; i += 4) {
            const r = data[i], g = data[i + 1], b = data[i + 2];
            rs += r; gs += g; bs += b; n++;
            // pixel "colorfulness" = max-min (ignores pure black/gray/white)
            const mx = Math.max(r, g, b), mn = Math.min(r, g, b);
            const colorfulness = (mx - mn) / 255;
            const pw = colorfulness * colorfulness; // emphasize colorful pixels
            rW += r * pw; gW += g * pw; bW += b * pw; wSum += pw;
            if (i % 48 === 0 && swatches.length < 16) swatches.push([r, g, b]);
          }
          const avgR = rs / n, avgG = gs / n, avgB = bs / n;
          const satR = wSum > 0 ? rW / wSum : avgR;
          const satG = wSum > 0 ? gW / wSum : avgG;
          const satB = wSum > 0 ? bW / wSum : avgB;
          const [hAvg, sAvg, lAvg] = rgbToHsl(avgR, avgG, avgB);
          const [hSat, sSat, lSat] = rgbToHsl(satR, satG, satB);
          resolve({
            avgRgb: [avgR, avgG, avgB],
            avgHsl: [hAvg, sAvg, lAvg],       // overall tonal feel
            satRgb: [satR, satG, satB],       // color character of the subject
            satHsl: [hSat, sSat, lSat],
            swatches,
          });
        };
        img.onerror = reject;
        img.src = imgSrc;
      });
    }

    function rgbToHsl(r, g, b) {
      r /= 255; g /= 255; b /= 255;
      const max = Math.max(r, g, b), min = Math.min(r, g, b);
      let h = 0, s = 0, l = (max + min) / 2;
      if (max !== min) {
        const d = max - min;
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        switch (max) {
          case r: h = ((g - b) / d + (g < b ? 6 : 0)); break;
          case g: h = ((b - r) / d + 2); break;
          case b: h = ((r - g) / d + 4); break;
        }
        h *= 60;
      }
      return [h, s, l];
    }

    // Derive tonal adjustments to nudge toward — NO hue shifting.
    // Uses saturation-weighted color for warmth (subject character),
    // unweighted averages for brightness/saturation feel.
    function computeMatchDelta(palette) {
      if (!palette) return null;
      const [satR, satG, satB] = palette.satRgb || palette.avgRgb;
      const [, sAvg, lAvg] = palette.avgHsl;
      // warmth in -1..1: positive = warm (reds/oranges), negative = cool (blues)
      const warmth = (satR - satB) / 255;
      return {
        warmth,
        saturation: palette.satHsl ? palette.satHsl[1] : sAvg,
        lightness: lAvg,
      };
    }

    // Copy the effective grade (and color-match snapshot) from the first still-beat main clip
    // onto the target clip. Returns { ok: bool, message: string }.
    function matchStyleToStills(state, targetTrack, targetId) {
      const stills = state.tracks.main.filter(c => c.kind === 'image');
      if (!stills.length) return { ok: false, message: 'No still beats on main track to match' };
      const source = stills[0];
      const effectiveGrade = source.grade
        ? { ...source.grade }
        : { ...state.projectGrade };
      // also snapshot the color-match state so if the project changes, this clip stays locked
      const matchSnapshot = state.colorMatch.refAssetId
        ? { refAssetId: state.colorMatch.refAssetId, strength: state.colorMatch.strength }
        : null;
      return {
        ok: true,
        patch: { grade: effectiveGrade, matchSnapshot },
        sourceLabel: source.label,
      };
    }

    // ──────────────────────────────────────────────────────────────
    //   CLIP DEFAULTS
    // ──────────────────────────────────────────────────────────────
    function defaultClip(track, asset, targetLength, reelLength) {
      const base = {
        id: newId('clip'),
        assetId: asset.id,
        label: asset.name,
        kind: asset.kind,
        trimStart: 0,
        speed: 1,
        scale: 1,
        offset: { x: 0, y: 0 },
        muted: track !== 'main',
        note: '',
        aiFlags: { removeBg: false, reframe: false, enhance: false, exposure: false },
        // per-clip grade override (null = use project grade)
        grade: null,
      };
      if (track === 'main') {
        let duration;
        if (asset.kind === 'image') duration = 2;
        else if (asset.duration && asset.duration > 0) duration = round2(asset.duration);
        else duration = 3; // video/audio fallback if probe hasn't finished
        return { ...base, duration, role: inferRole(asset), transitionIn: { type: 'cut', duration: 0 } };
      }
      if (track === 'overlay') {
        return { ...base, duration: reelLength, start: 0, autoFit: true, role: asset.isBrand ? 'brand' : 'overlay', position: { x: 0.03, y: 0.03, width: 0.2 } };
      }
      // music
      const musicDur = (asset.duration && asset.duration > 0) ? round2(asset.duration) : reelLength;
      return { ...base, duration: musicDur, start: 0, role: 'music' };
    }

    function inferRole(asset) {
      if (asset.kind === 'image') return 'still beat';
      return 'motion beat';
    }

    // ─────────────────────────────────────────────────────────────
    //   WebGL PIPELINE
    // ─────────────────────────────────────────────────────────────
    // Vertex shader — a full-screen quad, passes UV to fragment shader.
    const GL_VERT = `
      attribute vec2 a_pos;
      attribute vec2 a_uv;
      varying vec2 v_uv;
      void main() {
        v_uv = a_uv;
        gl_Position = vec4(a_pos, 0.0, 1.0);
      }
    `;

    // Fragment shader. All grade + auto + match math happens per-pixel here.
    // Uniforms:
    //   u_tex: source frame
    //   u_brightness, u_contrast, u_saturate, u_blacks, u_warmth: grade
    //   u_auto_intensity: 0..1 auto adjust strength
    //   u_auto_black, u_auto_white: black/white points (0..1 each)
    //   u_auto_gain: per-channel gain vec3 for gray-world correction
    //   u_match_intensity: 0..1
    //   u_match_lut: 256x1 RGB lookup texture, per-channel remap (0..255 -> 0..255 / 255)
    //   u_use_match_lut: 1.0 if match is active, 0.0 otherwise
    const GL_FRAG = `
      precision highp float;
      varying vec2 v_uv;
      uniform sampler2D u_tex;
      uniform float u_brightness;
      uniform float u_contrast;
      uniform float u_saturate;
      uniform float u_blacks;
      uniform float u_warmth;
      uniform float u_auto_intensity;
      uniform float u_auto_black;
      uniform float u_auto_white;
      uniform vec3  u_auto_gain;
      uniform float u_match_intensity;
      uniform sampler2D u_match_lut;
      uniform float u_use_match_lut;

      vec3 saturation(vec3 c, float amount) {
        float gray = dot(c, vec3(0.299, 0.587, 0.114));
        return mix(vec3(gray), c, amount);
      }

      void main() {
        vec4 tex = texture2D(u_tex, v_uv);
        vec3 col = tex.rgb;

        // ── auto adjust (blended by u_auto_intensity) ──
        if (u_auto_intensity > 0.001) {
          vec3 adj = col;
          // stretch black/white points
          float bp = u_auto_black;
          float wp = max(u_auto_white, bp + 0.01);
          adj = clamp((adj - bp) / (wp - bp), 0.0, 1.0);
          // gray-world gain neutralization
          adj = adj * u_auto_gain;
          // gentle mid-tone lift
          adj = pow(adj, vec3(0.95));
          col = mix(col, adj, u_auto_intensity);
        }

        // ── reference match via 1D LUT per channel ──
        if (u_use_match_lut > 0.5 && u_match_intensity > 0.001) {
          // sample the LUT at the current channel value for each of r/g/b
          float rMap = texture2D(u_match_lut, vec2(col.r, 0.5)).r;
          float gMap = texture2D(u_match_lut, vec2(col.g, 0.5)).g;
          float bMap = texture2D(u_match_lut, vec2(col.b, 0.5)).b;
          vec3 matched = vec3(rMap, gMap, bMap);
          col = mix(col, matched, u_match_intensity);
        }

        // ── grade: brightness ──
        col *= u_brightness;

        // ── grade: contrast around 0.5 pivot ──
        col = (col - 0.5) * u_contrast + 0.5;

        // ── grade: saturation ──
        col = saturation(col, u_saturate);

        // ── grade: blacks lift/crush ──
        // positive u_blacks lifts blacks, negative crushes
        col = col + u_blacks * (1.0 - smoothstep(0.0, 0.3, col));

        // ── grade: warmth ──
        // positive = warm (R up, B down), negative = cool (R down, B up)
        float w = u_warmth;
        col.r += w * 0.06;
        col.b -= w * 0.06;
        col = clamp(col, 0.0, 1.0);

        gl_FragColor = vec4(col, tex.a);
      }
    `;

    function compileShader(gl, type, src) {
      const s = gl.createShader(type);
      gl.shaderSource(s, src);
      gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
        const log = gl.getShaderInfoLog(s);
        gl.deleteShader(s);
        throw new Error('Shader compile failed: ' + log);
      }
      return s;
    }

    function createGLProgram(gl) {
      const vs = compileShader(gl, gl.VERTEX_SHADER, GL_VERT);
      const fs = compileShader(gl, gl.FRAGMENT_SHADER, GL_FRAG);
      const prog = gl.createProgram();
      gl.attachShader(prog, vs);
      gl.attachShader(prog, fs);
      gl.linkProgram(prog);
      if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
        throw new Error('Program link failed: ' + gl.getProgramInfoLog(prog));
      }
      // full-screen quad (triangle strip): x, y, u, v
      const quad = new Float32Array([
        -1, -1, 0, 1,   // BL
         1, -1, 1, 1,   // BR
        -1,  1, 0, 0,   // TL
         1,  1, 1, 0,   // TR
      ]);
      const buf = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buf);
      gl.bufferData(gl.ARRAY_BUFFER, quad, gl.STATIC_DRAW);

      const aPos = gl.getAttribLocation(prog, 'a_pos');
      const aUv  = gl.getAttribLocation(prog, 'a_uv');
      gl.enableVertexAttribArray(aPos);
      gl.enableVertexAttribArray(aUv);
      gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 16, 0);
      gl.vertexAttribPointer(aUv,  2, gl.FLOAT, false, 16, 8);

      // source texture
      const srcTex = gl.createTexture();
      gl.bindTexture(gl.TEXTURE_2D, srcTex);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);

      // match LUT texture (256x1 RGBA, slot 1)
      const lutTex = gl.createTexture();
      gl.bindTexture(gl.TEXTURE_2D, lutTex);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
      // initialize with identity LUT
      const identity = new Uint8Array(256 * 4);
      for (let i = 0; i < 256; i++) {
        identity[i * 4 + 0] = i;
        identity[i * 4 + 1] = i;
        identity[i * 4 + 2] = i;
        identity[i * 4 + 3] = 255;
      }
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 256, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE, identity);

      return { prog, srcTex, lutTex };
    }

    // Upload a 256x1 RGBA LUT from a pre-built Uint8Array
    function uploadMatchLUT(gl, lutTex, lut /* Uint8Array len=1024 */) {
      gl.activeTexture(gl.TEXTURE1);
      gl.bindTexture(gl.TEXTURE_2D, lutTex);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 256, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE, lut);
    }

    // Draw one frame: upload source (video/image) to srcTex, set uniforms, draw.
    function drawGLFrame(gl, handles, source, params) {
      const { prog, srcTex, lutTex } = handles;
      gl.useProgram(prog);

      // upload source
      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D, srcTex);
      gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, false);
      try {
        gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, source);
      } catch (e) {
        // may throw if video not ready — skip draw this frame
        return;
      }
      gl.uniform1i(gl.getUniformLocation(prog, 'u_tex'), 0);

      // match LUT on unit 1
      gl.activeTexture(gl.TEXTURE1);
      gl.bindTexture(gl.TEXTURE_2D, lutTex);
      gl.uniform1i(gl.getUniformLocation(prog, 'u_match_lut'), 1);

      // grade uniforms
      gl.uniform1f(gl.getUniformLocation(prog, 'u_brightness'), params.brightness);
      gl.uniform1f(gl.getUniformLocation(prog, 'u_contrast'),   params.contrast);
      gl.uniform1f(gl.getUniformLocation(prog, 'u_saturate'),   params.saturate);
      gl.uniform1f(gl.getUniformLocation(prog, 'u_blacks'),     params.blacks);
      gl.uniform1f(gl.getUniformLocation(prog, 'u_warmth'),     params.warmth || 0);

      gl.uniform1f(gl.getUniformLocation(prog, 'u_auto_intensity'), params.autoIntensity || 0);
      gl.uniform1f(gl.getUniformLocation(prog, 'u_auto_black'),     params.autoBlack || 0);
      gl.uniform1f(gl.getUniformLocation(prog, 'u_auto_white'),     params.autoWhite || 1);
      gl.uniform3f(gl.getUniformLocation(prog, 'u_auto_gain'),
        (params.autoGain && params.autoGain[0]) || 1,
        (params.autoGain && params.autoGain[1]) || 1,
        (params.autoGain && params.autoGain[2]) || 1);

      gl.uniform1f(gl.getUniformLocation(prog, 'u_match_intensity'), params.matchIntensity || 0);
      gl.uniform1f(gl.getUniformLocation(prog, 'u_use_match_lut'),   params.useMatchLut ? 1 : 0);

      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    }

    // Returns CSS styles for the outgoing and incoming layers during a transition.
    // p is progress 0..1. type is one of TRANSITIONS keys.
    function transitionStyles(type, p) {
      // p=0: outgoing fully visible, incoming not started
      // p=1: outgoing gone, incoming fully visible
      const out = {}; const inc = {};
      switch (type) {
        case 'dissolve':
          out.opacity = 1 - p;
          inc.opacity = p;
          break;
        case 'fadeBlack': {
          // fade to black at midpoint
          const half = p < 0.5 ? p * 2 : (1 - p) * 2; // 0..1..0
          const visible = p < 0.5 ? 'out' : 'in';
          out.opacity = visible === 'out' ? (1 - p * 2) : 0;
          inc.opacity = visible === 'in' ? ((p - 0.5) * 2) : 0;
          break;
        }
        case 'fadeWhite': {
          // overlay a white wash peaking at midpoint, with a crossfade underneath
          out.opacity = 1 - p;
          inc.opacity = p;
          // we'll also render a white overlay as a separate element — handled in JSX
          break;
        }
        case 'wipeLeft': {
          // incoming revealed from the right, covering outgoing
          out.opacity = 1;
          inc.opacity = 1;
          inc.clipPath = `inset(0 0 0 ${(1 - p) * 100}%)`;
          break;
        }
        case 'wipeRight': {
          out.opacity = 1;
          inc.opacity = 1;
          inc.clipPath = `inset(0 ${(1 - p) * 100}% 0 0)`;
          break;
        }
        case 'whipBlur': {
          // blur + slight translate to simulate whip pan
          const blurAmt = Math.sin(p * Math.PI) * 20; // peak at midpoint
          out.opacity = 1 - p;
          inc.opacity = p;
          out.filter = `blur(${blurAmt}px)`;
          inc.filter = `blur(${blurAmt}px)`;
          out.transform = `translateX(${-p * 40}%)`;
          inc.transform = `translateX(${(1 - p) * 40}%)`;
          break;
        }
        default:
          out.opacity = 1;
          inc.opacity = 0;
      }
      return { out, inc };
    }

    // ──────────────────────────────────────────────────────────────
    //   APP
    // ──────────────────────────────────────────────────────────────
    function App() {
      const [state, dispatch] = useReducer(reducer, null, loadState);
      const [activeTab, setActiveTab] = useState('match');
      const [leftCollapsed, setLeftCollapsed] = useState(false);
      const [rightCollapsed, setRightCollapsed] = useState(false);
      const [exportMenuOpen, setExportMenuOpen] = useState(false);
      const [modal, setModal] = useState(null); // { type: 'mp4'|'spec'|'error', ... }
      const [toasts, setToasts] = useState([]);
      const [cheatOpen, setCheatOpen] = useState(false);

      const pushToast = useCallback((message, kind = 'good', ttl = 2500) => {
        const id = newId('t');
        setToasts(prev => [...prev, { id, message, kind }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), ttl);
      }, []);

      // persist state
      useEffect(() => { persistState(state); }, [state]);

      // color match palette extraction
      useEffect(() => {
        const refAsset = state.assets.find(a => a.id === state.colorMatch.refAssetId);
        if (!refAsset || refAsset.kind !== 'image') {
          if (state.colorMatch.refPalette) dispatch({ type: 'PATCH_COLOR_MATCH', patch: { refPalette: null } });
          return;
        }
        extractPalette(refAsset.url)
          .then(pal => dispatch({ type: 'PATCH_COLOR_MATCH', patch: { refPalette: pal } }))
          .catch(e => console.warn('palette extract fail', e));
      }, [state.colorMatch.refAssetId, state.assets]);

      // playback loop — use refs so we don't recreate the effect every frame
      const rafRef = useRef(null);
      const lastTickRef = useRef(null);
      const stateRef = useRef(state);
      useEffect(() => { stateRef.current = state; }, [state]);

      useEffect(() => {
        if (!state.isPlaying) {
          if (rafRef.current) cancelAnimationFrame(rafRef.current);
          rafRef.current = null;
          lastTickRef.current = null;
          return;
        }
        const tick = (ts) => {
          if (lastTickRef.current == null) lastTickRef.current = ts;
          const dt = (ts - lastTickRef.current) / 1000;
          lastTickRef.current = ts;
          const s = stateRef.current;
          const reelLen = getReelLength(s);
          const nextT = s.playhead + dt;
          if (nextT >= reelLen) {
            dispatch({ type: 'SET_PLAYHEAD', t: reelLen });
            dispatch({ type: 'SET_PLAYING', playing: false });
            return;
          }
          dispatch({ type: 'SET_PLAYHEAD', t: nextT });
          rafRef.current = requestAnimationFrame(tick);
        };
        rafRef.current = requestAnimationFrame(tick);
        return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); };
      }, [state.isPlaying]);

      // keyboard shortcuts
      useEffect(() => {
        const onKey = (e) => {
          const tag = document.activeElement?.tagName;
          if (['INPUT', 'TEXTAREA', 'SELECT'].includes(tag)) return;
          if (e.code === 'Space') {
            e.preventDefault();
            const reelLen = getReelLength(state);
            if (!state.isPlaying && state.playhead >= reelLen - 0.05 && reelLen > 0.1) {
              // at the end — rewind to start (stay paused, user hits Space again to play)
              dispatch({ type: 'SET_PLAYHEAD', t: 0 });
            } else {
              dispatch({ type: 'SET_PLAYING', playing: !state.isPlaying });
            }
          }
          if (e.key === 'Delete' || e.key === 'Backspace') {
            if (state.selection.itemId) {
              dispatch({ type: 'REMOVE_CLIP', track: state.selection.track, id: state.selection.itemId });
              e.preventDefault();
            }
          }
          if (e.key === 's' || e.key === 'S') {
            // split main clip at playhead
            if (state.selection.track === 'main' && state.selection.itemId) {
              dispatch({ type: 'SPLIT_CLIP', id: state.selection.itemId });
            } else {
              // fallback: split whatever main clip is under the playhead
              const active = getActiveClipAt(state, 'main', state.playhead);
              if (active) dispatch({ type: 'SPLIT_CLIP', id: active.clip.id });
            }
            e.preventDefault();
          }
          if (e.key === '?' || (e.key === '/' && e.shiftKey)) {
            setCheatOpen(true);
            e.preventDefault();
          }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [state.isPlaying, state.selection, state.playhead, state.tracks.main]);

      // overlay auto-fit: any overlay with autoFit !== false follows the main track length
      useEffect(() => {
        const reelLen = getReelLength(state);
        state.tracks.overlay.forEach((c) => {
          if (c.autoFit !== false && Math.abs((c.duration || 0) - reelLen) > 0.05) {
            dispatch({ type: 'UPDATE_CLIP', track: 'overlay', id: c.id, patch: { duration: reelLen } });
          }
        });
        // eslint-disable-next-line
      }, [state.tracks.main, state.tracks.overlay.length]);

      // ───── media upload
      const addFiles = useCallback((files) => {
        const fileArr = Array.from(files || []);
        if (!fileArr.length) return;
        const assets = fileArr.map(f => ({
          id: newId('asset'),
          name: f.name,
          kind: getKind(f.type, f.name),
          sizeLabel: fmtBytes(f.size),
          url: URL.createObjectURL(f),
          isRef: false,
          isBrand: false,
          duration: null, // filled in asynchronously for video/audio
        }));
        dispatch({ type: 'ADD_ASSETS', assets });
        pushToast(`Loaded ${assets.length} ${assets.length === 1 ? 'file' : 'files'}`, 'good');

        // Probe duration for video/audio assets. We load them in a detached element and
        // read metadata. This updates the asset record so that any clip dropped onto the
        // timeline afterward gets the real duration.
        assets.forEach((asset) => {
          if (asset.kind !== 'video' && asset.kind !== 'audio') return;
          const el = document.createElement(asset.kind);
          el.preload = 'metadata';
          el.muted = true;
          const done = (duration) => {
            if (!duration || !isFinite(duration)) return;
            dispatch({ type: 'UPDATE_ASSET', id: asset.id, patch: { duration: round2(duration) } });
          };
          el.onloadedmetadata = () => {
            done(el.duration);
            if (asset.kind === 'video' && el.videoWidth === 0) {
              // Browser cannot decode this codec (likely HEVC/H.265) — auto-convert
              el.src = '';
              dispatch({ type: 'UPDATE_ASSET', id: asset.id, patch: { converting: true } });
              convertToH264(asset, dispatch, pushToast);
            } else {
              el.src = '';
            }
          };
          el.onerror = () => { /* leave duration null, default clip will use 3s fallback */ };
          el.src = asset.url;
        });
      }, [pushToast]);

      // ───── export handlers
      const reelLen = useMemo(() => getReelLength(state), [state.tracks.main]);
      const canExportMp4 = reelLen <= 30;

      const handleExport = async (kind) => {
        setExportMenuOpen(false);
        if (kind === 'brief-copy') {
          try {
            await navigator.clipboard.writeText(generateBrief(state));
            pushToast('Brief copied to clipboard — paste into GPT', 'good');
          } catch (err) {
            pushToast('Clipboard copy failed — use the Brief tab instead', 'bad', 3500);
          }
          return;
        }
        if (kind === 'spec') {
          exportSpec(state, pushToast);
          return;
        }
        if (kind === 'mp4') {
          if (!canExportMp4) {
            pushToast('MP4 export is for ≤30s reels. Use spec for longer.', 'warn', 3500);
            return;
          }
          // Detect file:// and bail with a clear error before trying
          if (window.location.protocol === 'file:') {
            setModal({
              type: 'mp4-error',
              message: 'Opened via file:// — ffmpeg.wasm needs http://.\n\nFix: open a terminal in the folder containing this file and run:\n\n  python3 -m http.server 8000\n\nThen open http://localhost:8000/reel-lab-v7.html in your browser.',
            });
            return;
          }
          setModal({ type: 'mp4', progress: 0, log: ['Loading ffmpeg.wasm (this may take a minute on first run)…'] });
          try {
            await runMp4Export(state, (progress, line) => {
              setModal(m => ({ ...m, progress: Math.max(m?.progress || 0, progress), log: line ? [...(m?.log || []), line] : (m?.log || []) }));
            });
            setModal(m => ({ ...m, done: true }));
            pushToast('MP4 export complete', 'good');
          } catch (err) {
            console.error(err);
            setModal({ type: 'mp4-error', message: err.message || String(err) });
            pushToast('MP4 export failed — see details', 'bad', 4000);
          }
        }
      };

      // ───── BG removal
      const [bgBusy, setBgBusy] = useState(false);
      const removeBgOnSelection = async () => {
        const sel = state.selection;
        if (!sel.itemId || sel.track !== 'main') { pushToast('Select an image clip first', 'warn'); return; }
        const clip = state.tracks.main.find(c => c.id === sel.itemId);
        if (!clip || clip.kind !== 'image') { pushToast('BG removal works on image clips only', 'warn'); return; }
        const asset = state.assets.find(a => a.id === clip.assetId);
        if (!asset) return;
        setBgBusy(true);
        pushToast('Loading BG removal model (first run ~5MB)…', 'good', 3500);
        try {
          const mod = await import('@imgly/background-removal');
          const removeBackground = mod.removeBackground || mod.default?.removeBackground;
          if (!removeBackground) throw new Error('BG removal module missing expected export');
          const blob = await removeBackground(asset.url);
          const url = URL.createObjectURL(blob);
          const newAsset = { id: newId('asset'), name: `${asset.name}.bg-removed.png`, kind: 'image', sizeLabel: fmtBytes(blob.size), url, isRef: false, isBrand: false };
          dispatch({ type: 'ADD_ASSETS', assets: [newAsset] });
          dispatch({ type: 'UPDATE_CLIP', track: 'main', id: clip.id, patch: { assetId: newAsset.id, label: newAsset.name } });
          pushToast('Background removed', 'good');
        } catch (err) {
          console.error(err);
          pushToast(`BG removal failed: ${err.message}`, 'bad', 4000);
        } finally {
          setBgBusy(false);
        }
      };

      return (
        <>
          <TopBar
            state={state}
            dispatch={dispatch}
            reelLen={reelLen}
            onToggleLeft={() => setLeftCollapsed(c => !c)}
            onToggleRight={() => setRightCollapsed(c => !c)}
            exportOpen={exportMenuOpen}
            setExportOpen={setExportMenuOpen}
            onExport={handleExport}
            canExportMp4={canExportMp4}
            openCheat={() => setCheatOpen(true)}
          />
          <div className="workspace">
            <LeftRail
              state={state}
              dispatch={dispatch}
              addFiles={addFiles}
              collapsed={leftCollapsed}
            />
            <Center
              state={state}
              dispatch={dispatch}
              reelLen={reelLen}
              pushToast={pushToast}
            />
            <RightDrawer
              state={state}
              dispatch={dispatch}
              activeTab={activeTab}
              setActiveTab={setActiveTab}
              collapsed={rightCollapsed}
              pushToast={pushToast}
            />
          </div>
          <ContextualToolbar
            state={state}
            dispatch={dispatch}
            onRemoveBg={removeBgOnSelection}
            bgBusy={bgBusy}
            pushToast={pushToast}
          />
          {modal && <ExportModal modal={modal} close={() => setModal(null)} />}
          {cheatOpen && <CheatSheet close={() => setCheatOpen(false)} />}
          <ToastStack toasts={toasts} />
        </>
      );
    }

    // ──────────────────────────────────────────────────────────────
    //   TOP BAR
    // ──────────────────────────────────────────────────────────────
    function TopBar({ state, dispatch, reelLen, onToggleLeft, onToggleRight, exportOpen, setExportOpen, onExport, canExportMp4, openCheat }) {
      const menuRef = useRef(null);
      useEffect(() => {
        if (!exportOpen) return;
        const onDoc = (e) => { if (menuRef.current && !menuRef.current.contains(e.target)) setExportOpen(false); };
        document.addEventListener('mousedown', onDoc);
        return () => document.removeEventListener('mousedown', onDoc);
      }, [exportOpen, setExportOpen]);

      return (
        <header className="topbar">
          <button className="btn ghost icon" onClick={onToggleLeft} title="Toggle left rail">⟨</button>
          <div className="brand">Reel Lab</div>
          <div className="divider" />
          <input
            className="project-name"
            value={state.projectName}
            onChange={(e) => dispatch({ type: 'PATCH', patch: { projectName: e.target.value } })}
            placeholder="Project name"
          />
          <div className="divider" />
          <select
            className="inp"
            style={{ width: 140 }}
            value={state.format}
            onChange={(e) => dispatch({ type: 'PATCH', patch: { format: e.target.value } })}
          >
