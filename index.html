        </div>
      );
    }

    // ──────────────────────────────────────────────────────────────
    //   EXPORTS
    // ──────────────────────────────────────────────────────────────
    function generateBrief(state) {
      const reel = getReelLength(state);
      const starts = getMainStarts(state.tracks.main);
      const lines = [];
      lines.push(`# ${state.projectName}`);
      lines.push(``);
      lines.push(`Format: ${state.format} (${FORMATS[state.format]?.w}×${FORMATS[state.format]?.h})`);
      lines.push(`Length: ${round2(reel)}s / ${state.targetLength}s target`);
      lines.push(``);
      lines.push(`## Grade`);
      lines.push(`Preset: ${state.projectGrade.preset}`);
      lines.push(`Brightness ${state.projectGrade.brightness}, contrast ${state.projectGrade.contrast}, saturation ${state.projectGrade.saturate}, blacks ${state.projectGrade.blacks}, warmth ${state.projectGrade.warmth || 0}`);
      lines.push(``);
      const refAsset = state.assets.find(a => a.id === state.colorMatch.refAssetId);
      if (refAsset) {
        const pal = state.colorMatch.refPalette;
        const d = computeMatchDelta(pal);
        lines.push(`## Tone match`);
        lines.push(`Reference: ${refAsset.name}`);
        lines.push(`Strength: ${Math.round(state.colorMatch.strength * 100)}% (affects saturation, brightness, warmth — NOT individual hue remapping)`);
        if (pal) {
          lines.push(`Subject RGB (saturation-weighted): ${(pal.satRgb || pal.avgRgb).map(v => Math.round(v)).join(', ')}`);
          lines.push(`Overall avg RGB: ${pal.avgRgb.map(v => Math.round(v)).join(', ')}`);
        }
        if (d) {
          lines.push(`Warmth: ${d.warmth.toFixed(2)} (${d.warmth > 0.1 ? 'warm' : d.warmth < -0.1 ? 'cool' : 'neutral'})`);
          lines.push(`Target saturation: ${d.saturation.toFixed(2)}, lightness: ${d.lightness.toFixed(2)}`);
          lines.push(`→ GPT: for true color match, build a LUT or curve from this reference in Resolve/FFmpeg's lut3d filter.`);
        }
        lines.push(``);
      }
      lines.push(`## Main track (${state.tracks.main.length} clips)`);
      state.tracks.main.forEach((c, i) => {
        const ai = Object.entries(c.aiFlags || {}).filter(([,v]) => v).map(([k]) => k).join(', ');
        const styleNote = c.grade
          ? ` — CUSTOM GRADE (locked, probably matched to stills): brightness ${c.grade.brightness}, contrast ${c.grade.contrast}, saturation ${c.grade.saturate}, blacks ${c.grade.blacks}`
          : '';
        const tIn = c.transitionIn;
        const transNote = (i > 0 && tIn && tIn.type !== 'cut' && tIn.duration > 0)
          ? ` — transition in: ${TRANSITIONS[tIn.type]?.label || tIn.type} (${tIn.duration}s, ffmpeg xfade=${TRANSITIONS[tIn.type]?.ffmpeg})`
          : '';
        lines.push(`${i + 1}. [${fmtTC(starts[i])} → ${fmtTC(starts[i] + c.duration)}] ${c.label} (${c.role}, ${round2(c.duration)}s${c.speed !== 1 ? `, ${c.speed}×` : ''}${c.muted ? ', muted' : ''}${c.trimStart ? `, trim in ${c.trimStart}s` : ''})${ai ? ` — AI: ${ai}` : ''}${styleNote}${transNote}${c.note ? ` — ${c.note}` : ''}`);
      });
      if (state.tracks.overlay.length) {
        lines.push(``);
        lines.push(`## Overlay track`);
        state.tracks.overlay.forEach((c, i) => {
          const p = c.position || {};
          lines.push(`${i + 1}. ${c.label} — ${c.role}, ${round2(c.duration)}s @ (${round2(p.x || 0)}, ${round2(p.y || 0)}), width ${round2((p.width || 0) * 100)}%`);
        });
      }
      if (state.tracks.music.length) {
        lines.push(``);
        lines.push(`## Music`);
        state.tracks.music.forEach((c, i) => {
          lines.push(`${i + 1}. ${c.label} — ${round2(c.duration)}s, volume ${state.music.volume}, fades ${state.music.fadeIn}s/${state.music.fadeOut}s`);
        });
      }
      if (state.sessionNotes) {
        lines.push(``);
        lines.push(`## Notes`);
        lines.push(state.sessionNotes);
      }
      lines.push(``);
      lines.push(`## Assets referenced`);
      state.assets.forEach(a => lines.push(`- ${a.name} (${a.kind}, ${a.sizeLabel})${a.isRef ? ' [color-ref]' : ''}${a.isBrand ? ' [brand]' : ''}`));
      return lines.join('\n');
    }

    function exportSpec(state, pushToast) {
      const brief = generateBrief(state);
      const ffmpeg = buildFfmpegCommand(state);
      const payload = {
        meta: {
          projectName: state.projectName,
          format: state.format,
          targetLength: state.targetLength,
          reelLength: getReelLength(state),
          exportedAt: new Date().toISOString(),
        },
        grade: state.projectGrade,
        colorMatch: { refAssetName: state.assets.find(a => a.id === state.colorMatch.refAssetId)?.name || null, strength: state.colorMatch.strength, avgRgb: state.colorMatch.refPalette?.avgRgb || null },
        music: state.music,
        tracks: state.tracks,
        assets: state.assets.map(a => ({ name: a.name, kind: a.kind, sizeLabel: a.sizeLabel, isRef: a.isRef, isBrand: a.isBrand })),
        brief,
        ffmpeg,
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `${slugify(state.projectName)}-recipe.json`;
      a.click(); URL.revokeObjectURL(url);
      pushToast('Recipe exported (JSON + FFmpeg)', 'good');
    }

    function buildFfmpegCommand(state) {
      const { w, h } = FORMATS[state.format] || FORMATS['9:16'];
      const inputs = [];
      const filters = [];
      let inputIdx = 0;
      const mainClips = state.tracks.main;
      const assetMap = new Map(state.assets.map(a => [a.id, a]));

      // Phase 1: normalize each clip's video stream (scale/pad/grade/speed) to [v0]…[vN]
      mainClips.forEach((c, i) => {
        const a = assetMap.get(c.assetId);
        if (!a) return;
        inputs.push(`-ss ${round2(c.trimStart || 0)} -t ${round2(c.duration * (c.speed || 1))} -i "${a.name}"`);
        let f = `[${inputIdx}:v]scale=${w}:${h}:force_original_aspect_ratio=decrease,pad=${w}:${h}:(ow-iw)/2:(oh-ih)/2,setsar=1,fps=30`;
        if (c.speed && c.speed !== 1) f += `,setpts=${(1 / c.speed).toFixed(3)}*PTS`;
        const g = c.grade || state.projectGrade;
        f += `,eq=brightness=${round2(g.brightness - 1)}:contrast=${round2(g.contrast)}:saturation=${round2(g.saturate)}`;
        f += `[v${i}]`;
        filters.push(f);
        inputIdx++;
      });

      // Phase 2: chain with xfade OR concat depending on whether any transitions exist.
      // xfade requires pairs, so we chain: xfade(v0, v1) -> x1, xfade(x1, v2) -> x2, ...
      // xfade offset = cumulative duration of previous clips minus half the transition duration.
      const hasAnyTransition = mainClips.some((c, i) =>
        i > 0 && c.transitionIn && c.transitionIn.type !== 'cut' && c.transitionIn.duration > 0
      );

      if (!hasAnyTransition || mainClips.length < 2) {
        // simple concat path — no transitions
        const concat = mainClips.map((_, i) => `[v${i}]`).join('');
        filters.push(`${concat}concat=n=${mainClips.length}:v=1:a=0[outv]`);
      } else {
        // xfade chain. Compute cumulative offsets.
        let prev = `[v0]`;
        let cumDur = Number(mainClips[0].duration || 0);
        for (let i = 1; i < mainClips.length; i++) {
          const c = mainClips[i];
          const tIn = c.transitionIn || { type: 'cut', duration: 0 };
          const useTrans = tIn.type !== 'cut' && tIn.duration > 0;
          const transDur = useTrans ? tIn.duration : 0;
          const transName = useTrans ? (TRANSITIONS[tIn.type]?.ffmpeg || 'fade') : 'fade';
          // xfade offset: point at which the transition starts in the combined stream
          // For a hard cut we still use xfade with duration 0.01 or fall back to concat pairs
          const outLabel = (i === mainClips.length - 1) ? '[outv]' : `[x${i}]`;
          if (useTrans) {
            const offset = round2(cumDur - transDur / 2);
            filters.push(`${prev}[v${i}]xfade=transition=${transName}:duration=${transDur}:offset=${offset}${outLabel}`);
          } else {
            // Use xfade with a minimal duration for a clean cut within the chain
            const offset = round2(cumDur);
            filters.push(`${prev}[v${i}]xfade=transition=fade:duration=0.04:offset=${offset}${outLabel}`);
          }
          // Cumulative duration: add this clip's duration minus the transition overlap
          cumDur = round2(cumDur + Number(c.duration || 0) - transDur);
          prev = outLabel;
        }
      }

      const cmd = `ffmpeg \\\n  ${inputs.join(' \\\n  ')} \\\n  -filter_complex "${filters.join(';\n')}" \\\n  -map "[outv]" -c:v libx264 -pix_fmt yuv420p -crf 18 -r 30 \\\n  "${slugify(state.projectName)}.mp4"`;
      return cmd;
    }

    const slugify = (t) => String(t).toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '') || 'reel-lab';

    // ── Shared FFmpeg instance (lazy-loaded once, reused for convert + export) ──
    let _ffmpegInstance = null;
    let _ffmpegLoading = null;
    async function getFFmpeg() {
      if (_ffmpegInstance) return _ffmpegInstance;
      if (_ffmpegLoading) return _ffmpegLoading;
      const { FFmpeg } = await import('@ffmpeg/ffmpeg');
      const { toBlobURL } = await import('@ffmpeg/util');
      const ff = new FFmpeg();
      const base = 'https://unpkg.com/@ffmpeg/core-st@0.12.6/dist/umd';
      _ffmpegLoading = ff.load({
        coreURL: await toBlobURL(`${base}/ffmpeg-core.js`, 'text/javascript'),
        wasmURL: await toBlobURL(`${base}/ffmpeg-core.wasm`, 'application/wasm'),
      }).then(() => { _ffmpegInstance = ff; _ffmpegLoading = null; return ff; });
      return _ffmpegLoading;
    }

    // ── Auto-convert unsupported codecs (HEVC etc.) to H.264 on import ──
    const MAX_CONVERT_BYTES = 200 * 1024 * 1024; // 200 MB

    async function convertToH264(asset, dispatch, pushToast) {
      try {
        const resp = await fetch(asset.url);
        const buf = await resp.arrayBuffer();
        if (buf.byteLength > MAX_CONVERT_BYTES) {
          dispatch({ type: 'UPDATE_ASSET', id: asset.id, patch: { converting: false } });
          pushToast(`${asset.name} too large to auto-convert (> 200 MB) — pre-convert on your phone`, 'warn');
          return;
        }
        const ff = await getFFmpeg();
        await ff.writeFile('input_conv.mp4', new Uint8Array(buf));
        await ff.exec([
          '-i', 'input_conv.mp4',
          '-c:v', 'libx264', '-preset', 'fast', '-crf', '23',
          '-c:a', 'aac', '-movflags', 'faststart',
          'output_conv.mp4',
        ]);
        const out = await ff.readFile('output_conv.mp4');
        const blob = new Blob([out.buffer.slice(0)], { type: 'video/mp4' });
        const newUrl = URL.createObjectURL(blob);
        const dur = await new Promise(res => {
          const v = document.createElement('video');
          v.src = newUrl;
          v.onloadedmetadata = () => { res(v.duration); v.src = ''; };
          v.onerror = () => res(null);
        });
        dispatch({ type: 'UPDATE_ASSET', id: asset.id, patch: {
          url: newUrl, converting: false,
          duration: dur && isFinite(dur) ? round2(dur) : asset.duration,
        }});
        pushToast(`${asset.name} → H.264 ready`, 'good');
        try { await ff.deleteFile('input_conv.mp4'); } catch {}
        try { await ff.deleteFile('output_conv.mp4'); } catch {}
      } catch (err) {
        dispatch({ type: 'UPDATE_ASSET', id: asset.id, patch: { converting: false } });
        pushToast(`Convert failed: ${String(err.message || err)}`, 'warn');
      }
    }

    async function runMp4Export(state, onProgress) {
      // Use the shared FFmpeg instance (may already be loaded from auto-convert)
      onProgress(0.02, 'Loading ffmpeg…');
      const ffmpeg = await getFFmpeg();
      ffmpeg.on('log', ({ message }) => onProgress(null, message));
      ffmpeg.on('progress', ({ progress }) => onProgress(Math.min(0.99, progress), null));
      onProgress(0.1, 'ffmpeg ready.');

      const mainClips = state.tracks.main;
      if (!mainClips.length) throw new Error('No clips on main track');

      const assetMap = new Map(state.assets.map(a => [a.id, a]));
      const { w, h } = FORMATS[state.format] || FORMATS['9:16'];

      // write input files
      const inputsArgs = [];
      const filters = [];
      let idx = 0;
      for (let i = 0; i < mainClips.length; i++) {
        const c = mainClips[i];
        const a = assetMap.get(c.assetId);
        if (!a) continue;
        const ext = a.name.split('.').pop();
        const fname = `in${i}.${ext}`;
        onProgress(0.1 + (i / mainClips.length) * 0.2, `Writing ${a.name}…`);
        const resp = await fetch(a.url);
        const buf = new Uint8Array(await resp.arrayBuffer());
        await ffmpeg.writeFile(fname, buf);

        if (a.kind === 'image') {
          inputsArgs.push('-loop', '1', '-t', String(round2(c.duration)), '-i', fname);
        } else if (a.kind === 'video') {
          inputsArgs.push('-ss', String(round2(c.trimStart || 0)), '-t', String(round2(c.duration * (c.speed || 1))), '-i', fname);
        } else {
          inputsArgs.push('-i', fname); // audio — probably shouldn't be on main
        }

        let f = `[${idx}:v]scale=${w}:${h}:force_original_aspect_ratio=decrease,pad=${w}:${h}:(ow-iw)/2:(oh-ih)/2,setsar=1,fps=30`;
        if (c.speed && c.speed !== 1 && a.kind === 'video') f += `,setpts=${(1 / c.speed).toFixed(3)}*PTS`;
        const g = c.grade || state.projectGrade;
        // note: eq contrast in ffmpeg: 1.0 is neutral
        f += `,eq=brightness=${round2(g.brightness - 1)}:contrast=${round2(g.contrast)}:saturation=${round2(g.saturate)}`;
        f += `[v${i}]`;
        filters.push(f);
        idx++;
      }

      // Chain with xfade if any transitions exist, otherwise simple concat
      const hasAnyTransition = mainClips.some((c, i) =>
        i > 0 && c.transitionIn && c.transitionIn.type !== 'cut' && c.transitionIn.duration > 0
      );
      if (!hasAnyTransition || mainClips.length < 2) {
        const concat = mainClips.map((_, i) => `[v${i}]`).join('');
        filters.push(`${concat}concat=n=${mainClips.length}:v=1:a=0[outv]`);
      } else {
        let prev = `[v0]`;
        let cumDur = Number(mainClips[0].duration || 0);
        for (let i = 1; i < mainClips.length; i++) {
          const c = mainClips[i];
          const tIn = c.transitionIn || { type: 'cut', duration: 0 };
          const useTrans = tIn.type !== 'cut' && tIn.duration > 0;
          const transDur = useTrans ? tIn.duration : 0.04;
          const transName = useTrans ? (TRANSITIONS[tIn.type]?.ffmpeg || 'fade') : 'fade';
          const outLabel = (i === mainClips.length - 1) ? '[outv]' : `[x${i}]`;
          const offset = useTrans ? round2(cumDur - transDur / 2) : round2(cumDur);
          filters.push(`${prev}[v${i}]xfade=transition=${transName}:duration=${transDur}:offset=${offset}${outLabel}`);
          cumDur = round2(cumDur + Number(c.duration || 0) - (useTrans ? transDur : 0));
          prev = outLabel;
        }
      }

      // music? We'll skip for v1 MP4 export (keep it lean) unless there's exactly one music clip
      const hasMusic = state.tracks.music.length > 0;
      let musicInputIdx = null;
      if (hasMusic) {
        const mc = state.tracks.music[0];
        const ma = assetMap.get(mc.assetId);
        if (ma) {
          const ext = ma.name.split('.').pop();
          const fname = `music.${ext}`;
          onProgress(0.32, `Writing music…`);
          const resp = await fetch(ma.url);
          const buf = new Uint8Array(await resp.arrayBuffer());
          await ffmpeg.writeFile(fname, buf);
          inputsArgs.push('-i', fname);
          musicInputIdx = idx;
          filters.push(`[${musicInputIdx}:a]volume=${state.music.volume},afade=t=in:st=0:d=${state.music.fadeIn},afade=t=out:st=${Math.max(0, getReelLength(state) - state.music.fadeOut)}:d=${state.music.fadeOut}[outa]`);
        }
      }

      const out = `out.mp4`;
      const filterStr = filters.join(';');
      const cmdArgs = [
        ...inputsArgs,
        '-filter_complex', filterStr,
        '-map', '[outv]',
      ];
      if (hasMusic && musicInputIdx !== null) {
        cmdArgs.push('-map', '[outa]', '-c:a', 'aac', '-b:a', '192k');
      }
      cmdArgs.push(
        '-c:v', 'libx264',
        '-pix_fmt', 'yuv420p',
        '-preset', 'veryfast',
        '-crf', '20',
        '-r', '30',
        out,
      );
      onProgress(0.35, `Encoding (${cmdArgs.join(' ')})`);
      await ffmpeg.exec(cmdArgs);
      onProgress(0.95, 'Reading output…');
      const data = await ffmpeg.readFile(out);
      const blob = new Blob([data.buffer], { type: 'video/mp4' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `${slugify(state.projectName)}.mp4`;
      a.click();
      onProgress(1.0, 'Done.');
    }

    // ──────────────────────────────────────────────────────────────
    //   EXPORT MODAL
    // ──────────────────────────────────────────────────────────────
    function ExportModal({ modal, close }) {
      const logRef = useRef(null);
      useEffect(() => {
        if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight;
      }, [modal.log?.length]);

      if (modal.type === 'mp4-error') {
        return (
          <div className="modal-backdrop" onClick={close}>
            <div className="modal" onClick={(e) => e.stopPropagation()}>
              <h2>MP4 export failed</h2>
              <p>Something went wrong. If you opened this file directly via file://, ffmpeg.wasm may be limited. Try opening it from a local server (e.g. <code className="font-mono">python3 -m http.server</code>).</p>
              <div className="log">{modal.message}</div>
              <div className="row-end">
                <button className="btn" onClick={close}>Close</button>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="modal-backdrop" onClick={modal.done ? close : undefined}>
          <div className="modal" onClick={(e) => e.stopPropagation()}>
            <h2>{modal.done ? 'Export complete' : 'Rendering MP4…'}</h2>
            <p>{modal.done ? 'Your MP4 has been downloaded.' : 'This runs in your browser via ffmpeg.wasm. First run fetches ~30MB of core files. Larger projects can take a while.'}</p>
            <div className="progress-bar"><div className="progress-fill" style={{ width: `${Math.round((modal.progress || 0) * 100)}%` }} /></div>
            <div className="log" ref={logRef}>{(modal.log || []).slice(-40).join('\n')}</div>
            <div className="row-end">
              <button className="btn" onClick={close}>{modal.done ? 'Close' : 'Dismiss (cancel not supported)'}</button>
            </div>
          </div>
        </div>
      );
    }

    // ──────────────────────────────────────────────────────────────
    //   TOASTS
    // ──────────────────────────────────────────────────────────────
    function ToastStack({ toasts }) {
      return (
        <div className="toast-container">
          {toasts.map(t => (
            <div key={t.id} className={`toast ${t.kind}`}>{t.message}</div>
          ))}
        </div>
      );
    }

    // ──────────────────────────────────────────────────────────────
    //   CHEAT SHEET
    // ──────────────────────────────────────────────────────────────
    function CheatSheet({ close }) {
      const SHORTCUTS = [
        { section: 'Playback' },
        { key: 'Space', action: 'Play / pause · at end: rewind to start' },
        { section: 'Editing' },
        { key: 'S', action: 'Split selected main clip at playhead' },
        { key: 'Delete / Backspace', action: 'Remove selected clip' },
        { key: '?', action: 'Show this cheat sheet' },
        { section: 'Mouse · Timeline' },
        { key: 'Click asset in library', action: 'Preview it' },
        { key: 'Double-click asset', action: 'Add to timeline' },
        { key: 'Drag asset', action: 'Drop onto a specific lane' },
        { key: 'Right-click asset', action: 'Context menu (pin ref, set brand, remove)' },
        { key: 'Drag clip edges', action: 'Trim start / end' },
        { key: 'Drag main clip', action: 'Reorder' },
        { key: 'Drag playhead or ruler', action: 'Scrub' },
        { key: 'Click diamond between clips', action: 'Add / change transition (dissolve, fade, wipe, whip)' },
        { section: 'Mouse · Preview' },
        { key: 'Drag preview', action: 'Pan the main shot inside the frame' },
        { key: 'Drag corner handle', action: 'Scale main shot (when selected)' },
        { key: 'Drag overlay', action: 'Move overlay · corners resize' },
        { section: 'Tone match (video)' },
        { key: 'Pick reference', action: 'In Match tab, click a pinned image' },
        { key: 'Ctrl/Cmd+click video clip', action: 'Queue for tone match' },
        { key: 'Match N clips', action: 'Apply queued tone match (Match tab)' },
      ];
      return (
        <div className="modal-backdrop" onClick={close}>
          <div className="modal" onClick={(e) => e.stopPropagation()} style={{ maxWidth: 560, minWidth: 440 }}>
            <h2>Shortcuts</h2>
            <p className="hint" style={{ marginBottom: 14 }}>Press <kbd style={{ background: 'var(--panel)', border: '1px solid var(--line-2)', padding: '1px 6px', borderRadius: 3, fontFamily: 'Geist Mono', fontSize: 10 }}>?</kbd> anytime to open this.</p>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 2, fontSize: 12 }}>
              {SHORTCUTS.map((s, i) => s.section ? (
                <div key={i} className="sec-label" style={{ marginTop: i === 0 ? 0 : 10, marginBottom: 4 }}>{s.section}</div>
              ) : (
                <div key={i} style={{ display: 'grid', gridTemplateColumns: '180px 1fr', gap: 10, padding: '3px 0', alignItems: 'baseline' }}>
                  <kbd style={{ background: 'var(--panel)', border: '1px solid var(--line-2)', padding: '2px 8px', borderRadius: 4, fontFamily: 'Geist Mono', fontSize: 11, color: 'var(--text)', width: 'fit-content' }}>{s.key}</kbd>
                  <span style={{ color: 'var(--muted)', lineHeight: 1.4 }}>{s.action}</span>
                </div>
              ))}
            </div>
            <div className="row-end" style={{ marginTop: 18 }}>
              <button className="btn" onClick={close}>Close</button>
            </div>
          </div>
        </div>
      );
    }

    // ──────────────────────────────────────────────────────────────
    //   MOUNT
    // ──────────────────────────────────────────────────────────────
    createRoot(document.getElementById('root')).render(<App />);

    // expose for debugging
    window.__ReelLab = { loadState, defaultState };
  </script>
</body>
